<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasties — Florence to the United States, 1400–2000</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#efe4cb;
  --paper-2:#e7dabd;
  --paper-card:#f3ebd6;
  --paper-hi:#f7f1e1;
  --ink:#1d2538;
  --ink-2:#2c3349;
  --ink-soft:#5a5946;
  --ink-faint:#857f63;
  --rule:#b9a982;
  --rule-soft:#cabd99;
  --gold:#a9772f;
  --gold-2:#8a5f23;
  --ochre:#b0843e;
  --sage:#5d7150;
  --oxblood:#9a3f33;
  --oxblood-2:#7e3329;
  --shadow:rgba(40,33,18,.18);
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-serif:'EB Garamond',Georgia,serif;
  --font-ui:'Archivo','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-serif);
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    radial-gradient(ellipse 120% 80% at 50% -10%, rgba(247,241,225,.55), transparent 60%),
    radial-gradient(ellipse 100% 120% at 50% 120%, rgba(40,33,18,.10), transparent 55%),
    repeating-linear-gradient(0deg, rgba(120,100,60,.020) 0px, rgba(120,100,60,.020) 1px, transparent 1px, transparent 3px),
    repeating-linear-gradient(90deg, rgba(120,100,60,.018) 0px, rgba(120,100,60,.018) 1px, transparent 1px, transparent 4px);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
body.lined{
  /* slightly stronger paper grain when texture on (default) */
}
::selection{background:rgba(169,119,47,.30);}

/* ---------- layout shell ---------- */
.shell{max-width:1280px;margin:0 auto;padding:0 22px 0;}
#app{min-height:calc(100vh - 54px);}

/* ---------- top bar / masthead ---------- */
.masthead{
  display:flex;align-items:baseline;justify-content:space-between;gap:18px;
  padding:16px 0 12px;border-bottom:2px solid var(--ink);position:relative;
}
.masthead::after{content:"";position:absolute;left:0;right:0;bottom:-5px;height:1px;background:var(--rule);}
.mast-title{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);line-height:1;}
.mast-title .swash{color:var(--gold);font-style:italic;text-transform:none;font-weight:600;letter-spacing:0;}
.mast-sub{font-family:var(--font-ui);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);}
.mast-counter{font-family:var(--font-ui);text-align:right;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap;}
.mast-counter b{font-family:var(--font-display);font-size:25px;font-weight:600;letter-spacing:.02em;color:var(--ink);display:block;line-height:1;}

/* ---------- timeline ---------- */
.timeline{margin:14px 0 6px;}
.tl-track{position:relative;height:62px;border:1px solid var(--rule);background:rgba(247,241,225,.4);display:flex;overflow:hidden;}
.tl-band{position:relative;border-right:1px solid var(--rule);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px;padding:5px 6px;overflow:hidden;transition:opacity .4s, background .4s;}
.tl-band:last-child{border-right:none;}
.tl-band .tl-ir{font-family:var(--font-ui);font-size:9px;letter-spacing:.16em;color:var(--gold-2);font-weight:700;}
.tl-band .tl-center{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--ink);line-height:1.02;text-align:center;white-space:nowrap;}
.tl-band .tl-sub{font-family:var(--font-ui);font-size:7.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.tl-band.future{opacity:.42;background:repeating-linear-gradient(45deg,rgba(120,100,60,.05) 0 6px,transparent 6px 12px);}
.tl-band.current{background:rgba(169,119,47,.12);opacity:1;}
.tl-band.past{opacity:.66;}
.tl-stage{position:absolute;top:0;bottom:0;border-right:1px dotted var(--rule-soft);}
.tl-years{display:flex;justify-content:space-between;margin-top:3px;}
.tl-years span{font-family:var(--font-ui);font-size:9px;letter-spacing:.1em;color:var(--ink-faint);}
.tl-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--oxblood);z-index:4;box-shadow:0 0 0 1px rgba(247,241,225,.6);}
.tl-marker::before{content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%) rotate(45deg);width:8px;height:8px;background:var(--oxblood);}
.tl-span{position:absolute;top:0;bottom:0;background:rgba(154,63,51,.13);z-index:2;}

/* ---------- main grid ---------- */
.play-grid{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(0,1fr);gap:20px;margin-top:16px;align-items:start;}
@media(max-width:900px){.play-grid{grid-template-columns:1fr;}}

/* section label */
.sec-label{font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-2);display:flex;align-items:center;gap:8px;margin:0 0 9px;}
.sec-label::after{content:"";flex:1;height:1px;background:var(--rule);}

/* ---------- board ---------- */
.board{}
.board-row{display:grid;grid-template-columns:20px 1fr 22px;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--rule-soft);}
.board-row:first-of-type{border-top:1px solid var(--rule);}
.bn{font-family:var(--font-display);font-size:16px;color:var(--ink-faint);text-align:center;font-weight:600;}
.bl-name{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);}
.bl-state{font-family:var(--font-serif);font-size:14px;color:var(--ink-soft);line-height:1.32;}
.trend{font-size:16px;text-align:center;font-weight:700;line-height:1;}
.trend.up{color:var(--sage);}
.trend.down{color:var(--oxblood);}
.trend.flat,.trend.dash{color:var(--ink-faint);}
.board-row.lv7{background:linear-gradient(90deg,rgba(169,119,47,.10),transparent 80%);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:2px;}

/* ---------- family panel ---------- */
.family{border:1px solid var(--rule);background:var(--paper-card);box-shadow:2px 3px 0 var(--shadow);}
.family-hd{padding:12px 16px 10px;border-bottom:1px solid var(--rule);background:linear-gradient(180deg,rgba(247,241,225,.6),transparent);}
.family-crest{font-family:var(--font-ui);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-2);font-weight:700;}
.family-name{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--ink);line-height:1.05;margin-top:2px;}
.family-name .of{font-style:italic;font-weight:500;color:var(--ink-soft);font-size:20px;}
.inherited{margin:0;padding:11px 16px;background:repeating-linear-gradient(45deg,rgba(120,100,60,.04) 0 7px,transparent 7px 14px);border-bottom:1px dashed var(--rule);}
.inherited .ih-label{font-family:var(--font-ui);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:4px;}
.inherited .ih-text{font-family:var(--font-serif);font-style:italic;font-size:13.5px;color:var(--ink-soft);line-height:1.4;}
.stats{padding:8px 16px 14px;}
.stat{display:grid;grid-template-columns:96px 1fr;gap:8px;padding:6px 0;border-bottom:1px dotted var(--rule-soft);align-items:baseline;}
.stat:last-child{border-bottom:none;}
.stat .k{font-family:var(--font-ui);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}
.stat .v{font-family:var(--font-serif);font-size:14.5px;color:var(--ink);line-height:1.3;}
.stat .v.cap{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--gold-2);}
.stat .v .sub{font-family:var(--font-ui);font-size:10px;letter-spacing:.05em;color:var(--ink-faint);text-transform:uppercase;display:block;margin-top:1px;}

/* ---------- decisions ---------- */
.decisions-wrap{margin-top:22px;}
.dec-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
@media(max-width:760px){.dec-grid{grid-template-columns:1fr;}}
.dcard{border:1px solid var(--rule);background:var(--paper-card);box-shadow:2px 3px 0 var(--shadow);display:flex;flex-direction:column;}
.dcard-hd{padding:9px 12px;border-bottom:1px solid var(--rule);display:flex;align-items:baseline;justify-content:space-between;gap:8px;background:linear-gradient(180deg,rgba(29,37,56,.05),transparent);}
.dcard-hd .dt{font-family:var(--font-ui);font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);}
.dcard-hd .dt .num{color:var(--gold);margin-right:5px;}
.dcard-hd .dl{font-family:var(--font-ui);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;}
.opts{padding:5px 8px 8px;display:flex;flex-direction:column;gap:3px;}
.opt{border:1px solid transparent;border-radius:2px;padding:7px 9px;cursor:pointer;transition:background .15s,border-color .15s;position:relative;}
.opt:hover{background:rgba(169,119,47,.08);}
.opt.sel{background:rgba(169,119,47,.15);border-color:var(--gold);box-shadow:inset 0 0 0 1px rgba(169,119,47,.35);}
.opt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.opt-name{font-family:var(--font-serif);font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.22;}
.opt.jump .opt-name{color:var(--oxblood-2);}
.opt.jump .opt-name::before{content:"⚓ ";font-size:11px;color:var(--oxblood);}
.rr{display:flex;gap:6px;flex-shrink:0;padding-top:1px;}
.chip{font-family:var(--font-ui);font-size:8px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:3px;white-space:nowrap;color:var(--ink-soft);}
.chip .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.chip.low .dot{background:var(--sage);}
.chip.medium .dot{background:var(--ochre);}
.chip.high .dot{background:var(--oxblood);}
.opt-sel-mark{display:none;font-family:var(--font-ui);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);font-weight:700;margin-top:5px;}
.opt.sel .opt-sel-mark{display:block;}

/* ---------- forecast + live ---------- */
.forecast{margin-top:18px;border:1px solid var(--ink);background:linear-gradient(180deg,rgba(29,37,56,.04),rgba(247,241,225,.3));box-shadow:2px 3px 0 var(--shadow);}
.forecast-hd{padding:9px 16px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
.forecast-hd .fh{font-family:var(--font-ui);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--ink);}
.forecast-hd .fcount{font-family:var(--font-ui);font-size:10px;letter-spacing:.08em;color:var(--ink-faint);}
.forecast-body{padding:10px 16px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px 22px;}
@media(max-width:700px){.forecast-body{grid-template-columns:1fr;}}
.fc-row{display:flex;gap:9px;align-items:baseline;padding:4px 0;border-bottom:1px dotted var(--rule-soft);}
.fc-row .fc-t{font-family:var(--font-ui);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);font-weight:700;min-width:78px;flex-shrink:0;}
.fc-row .fc-v{font-family:var(--font-serif);font-size:13.5px;font-style:italic;color:var(--ink-soft);line-height:1.32;}
.fc-row .fc-v.empty{color:var(--ink-faint);opacity:.7;font-style:normal;}
.live-bar{padding:14px 16px;border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.live-note{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--ink-faint);max-width:480px;}

/* ---------- buttons ---------- */
.btn{font-family:var(--font-ui);font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;transition:transform .1s, background .2s, box-shadow .2s;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--ink);color:var(--paper-hi);font-size:13px;padding:13px 26px;box-shadow:3px 3px 0 var(--gold-2);border:1px solid var(--ink);}
.btn-primary:hover{background:var(--ink-2);box-shadow:3px 3px 0 var(--gold);}
.btn-primary:disabled{background:#b7ad92;color:#e7dec6;box-shadow:3px 3px 0 #9b9072;cursor:not-allowed;border-color:#9b9072;}
.btn-primary .yrs{display:block;font-size:9px;letter-spacing:.16em;opacity:.7;margin-top:2px;font-weight:500;}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--ink);font-size:12px;padding:11px 22px;}
.btn-ghost:hover{background:rgba(29,37,56,.07);}
.btn-gold{background:var(--gold);color:#fff6e4;border:1px solid var(--gold-2);font-size:13px;padding:13px 28px;box-shadow:3px 3px 0 var(--ink);}
.btn-gold:hover{background:var(--gold-2);}

/* ---------- title screen ---------- */
.title-screen{max-width:760px;margin:0 auto;padding:46px 16px 30px;text-align:center;}
.ts-kicker{font-family:var(--font-ui);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-2);font-weight:700;}
.ts-title{font-family:var(--font-display);font-size:74px;font-weight:700;letter-spacing:.04em;line-height:.98;margin:10px 0 4px;color:var(--ink);text-transform:uppercase;}
@media(max-width:560px){.ts-title{font-size:48px;}}
.ts-rule{width:120px;height:2px;background:var(--gold);margin:14px auto 18px;position:relative;}
.ts-rule::before,.ts-rule::after{content:"";position:absolute;top:50%;width:5px;height:5px;background:var(--gold);transform:translateY(-50%) rotate(45deg);}
.ts-rule::before{left:-12px;}.ts-rule::after{right:-12px;}
.ts-lede{font-family:var(--font-serif);font-size:19px;color:var(--ink-soft);line-height:1.5;max-width:600px;margin:0 auto 8px;}
.ts-lede em{color:var(--gold-2);font-style:italic;}
.ts-route{font-family:var(--font-ui);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:18px auto 30px;line-height:2.1;}
.ts-route b{color:var(--ink);font-weight:700;}
.ts-form{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:8px;}
.house-input-wrap{position:relative;display:inline-block;}
.house-input{font-family:var(--font-display);font-size:26px;font-weight:600;text-align:center;background:var(--paper-card);border:none;border-bottom:2px solid var(--ink);color:var(--ink);padding:8px 18px 6px;min-width:320px;outline:none;}
.house-input::placeholder{color:var(--ink-faint);font-style:italic;font-weight:500;}
.house-label{font-family:var(--font-ui);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:2px;}
.ts-fineprint{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--ink-faint);margin-top:24px;max-width:540px;margin-left:auto;margin-right:auto;line-height:1.5;}
.ts-rules{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:34px auto 0;max-width:680px;text-align:left;}
@media(max-width:620px){.ts-rules{grid-template-columns:1fr;}}
.ts-rule-card{border-top:2px solid var(--ink);padding-top:9px;}
.ts-rule-card h4{font-family:var(--font-ui);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);margin:0 0 5px;font-weight:700;}
.ts-rule-card p{font-family:var(--font-serif);font-size:14px;color:var(--ink-soft);margin:0;line-height:1.42;}

/* ---------- outcome screen ---------- */
.outcome-screen{margin-top:18px;}
.oc-head{text-align:center;margin-bottom:18px;}
.oc-head .oc-gen{font-family:var(--font-ui);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-2);font-weight:700;}
.oc-head .oc-title{font-family:var(--font-display);font-size:38px;font-weight:700;color:var(--ink);line-height:1.04;margin:3px 0;}
.oc-head .oc-span{font-family:var(--font-serif);font-style:italic;font-size:16px;color:var(--ink-soft);}
.oc-list{display:flex;flex-direction:column;gap:14px;max-width:880px;margin:0 auto;}
.oc-item{border:1px solid var(--rule);background:var(--paper-card);box-shadow:2px 3px 0 var(--shadow);padding:14px 18px;position:relative;}
.oc-item.fail-go{border-color:var(--oxblood);box-shadow:2px 3px 0 rgba(126,51,41,.3);background:linear-gradient(180deg,rgba(154,63,51,.06),var(--paper-card));}
.oc-item.fail-sb{border-color:var(--ochre);background:linear-gradient(180deg,rgba(176,132,62,.07),var(--paper-card));}
.oc-dt{font-family:var(--font-ui);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;}
.oc-choice{font-family:var(--font-display);font-size:23px;font-weight:600;color:var(--ink);line-height:1.1;margin:1px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.oc-text{font-family:var(--font-serif);font-size:16.5px;color:var(--ink);line-height:1.5;}
.oc-why{font-family:var(--font-serif);font-style:italic;font-size:13.5px;color:var(--ink-soft);line-height:1.45;margin-top:9px;padding-top:8px;border-top:1px dotted var(--rule-soft);}
.oc-why b{font-family:var(--font-ui);font-style:normal;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);font-weight:700;margin-right:6px;}
.fail-badge{font-family:var(--font-ui);font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:2px;white-space:nowrap;}
.fail-badge.go{background:var(--oxblood);color:#fbeede;}
.fail-badge.sb{background:var(--ochre);color:#fff6e4;}
.oc-fail-msg{font-family:var(--font-serif);font-size:15px;color:var(--oxblood-2);line-height:1.45;margin-top:9px;padding:9px 12px;background:rgba(154,63,51,.07);border-left:3px solid var(--oxblood);}
.oc-item.fail-sb .oc-fail-msg{color:var(--gold-2);background:rgba(176,132,62,.09);border-left-color:var(--ochre);}
.oc-advance{text-align:center;margin:26px auto 6px;}
.oc-summary{max-width:760px;margin:8px auto 18px;text-align:center;font-family:var(--font-serif);font-style:italic;font-size:15px;color:var(--ink-soft);line-height:1.5;padding:14px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.oc-summary b{font-family:var(--font-ui);font-style:normal;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);}

/* ---------- game over / end ---------- */
.endscreen{background:var(--ink);color:var(--paper);min-height:calc(100vh - 54px);margin:0 -22px;padding:0;}
.endscreen.broken{background:#161b29;}
.end-inner{max-width:820px;margin:0 auto;padding:54px 24px 48px;text-align:center;}
.end-kicker{font-family:var(--font-ui);font-size:11px;letter-spacing:.3em;text-transform:uppercase;font-weight:700;}
.broken .end-kicker{color:var(--oxblood);}
.end .end-kicker, .end-kicker.gold{color:var(--gold);}
.end-title{font-family:var(--font-display);font-size:62px;font-weight:700;letter-spacing:.03em;line-height:1;margin:10px 0 6px;color:var(--paper-hi);text-transform:uppercase;}
@media(max-width:560px){.end-title{font-size:42px;}}
.end-rule{width:90px;height:2px;background:var(--gold);margin:16px auto 22px;}
.end-analog{font-family:var(--font-serif);font-size:19px;line-height:1.5;color:#e4dcc4;max-width:640px;margin:0 auto 20px;}
.broken .end-analog{color:#ddd0c4;}
.end-analog em{color:var(--gold);font-style:italic;}
.end-card{background:rgba(247,241,225,.06);border:1px solid rgba(185,169,130,.4);padding:18px 22px;margin:22px auto;max-width:620px;text-align:left;}
.end-card h4{font-family:var(--font-ui);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:0 0 10px;text-align:center;}
.end-stat{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:5px 0;border-bottom:1px dotted rgba(185,169,130,.3);}
.end-stat:last-child{border-bottom:none;}
.end-stat .k{font-family:var(--font-ui);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#a99b78;font-weight:600;}
.end-stat .v{font-family:var(--font-serif);font-size:15.5px;color:var(--paper-hi);}
.end-journey{font-family:var(--font-serif);font-size:16.5px;line-height:1.6;color:#e4dcc4;max-width:680px;margin:18px auto;}
